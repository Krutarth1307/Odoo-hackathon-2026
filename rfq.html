<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create RFQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
margin-bottom:25px;
color:#0f172a;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
height:120px;
resize:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.btn{
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.btn:hover{
background:#1d4ed8;
}

.vendor-box{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-top:10px;
}

        /* Dark Mode overrides */
        body.dark-mode {
            background: #0b0f19;
            color: #cbd5e1;
        }
        body.dark-mode .container {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode h1,
        body.dark-mode label {
            color: #f8fafc;
        }
        body.dark-mode input,
        body.dark-mode textarea,
        body.dark-mode select {
            background: #0f172a;
            color: #f8fafc;
            border-color: #334155;
        }
        body.dark-mode .vendor-box {
            border-color: #334155;
        }
</style>
</head>

<body>
<script>
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
    }
</script>

<div class="container">

<h1>Create RFQ</h1>

<form id="rfqForm">

<div class="form-group">
<label>RFQ Title</label>
<input type="text" id="rfqTitle" placeholder="Enter RFQ Title" required>
</div>

<div class="form-group">
<label>Product / Service Details</label>
<textarea id="rfqDescription" placeholder="Describe products or services" required></textarea>
</div>

<div class="row">

<div class="form-group">
<label>Quantity</label>
<input type="number" id="rfqQuantity" placeholder="Enter Quantity" required>
</div>

<div class="form-group">
<label>Deadline</label>
<input type="date" id="rfqDeadline" required>
</div>

</div>

<div class="form-group">
<label>Estimated Budget (INR)</label>
<input type="number" id="rfqBudget" placeholder="Enter Budget">
</div>

<div class="form-group">
<label>Vendor Category</label>
<select id="rfqCategory">
<option value="">-- Select Category --</option>
</select>
</div>

<div class="form-group">
<label>Select Vendors</label>
<div id="rfqVendorsList" style="display: flex; flex-direction: column; gap: 8px;">
    <div style="color: #94a3b8; font-style: italic;">Select a category to filter vendors...</div>
</div>
</div>

<div class="form-group">
<label>Upload Attachment</label>
<input type="file" id="rfqAttachment">
</div>

<div class="form-group">
<label>Special Instructions</label>
<textarea id="rfqInstructions" placeholder="Any additional requirements"></textarea>
</div>

<button type="submit" class="btn">
Create RFQ
</button>

</form>

</div>

<script>
    const API = '';
    let allVendors = [];

    async function loadData() {
        try {
            const res = await fetch(`${API}/api/vendors`);
            allVendors = await res.json();
            
            // Extract unique categories
            const categories = [...new Set(allVendors.map(v => v.category).filter(Boolean))];
            const select = document.getElementById('rfqCategory');
            select.innerHTML = '<option value="">-- Select Category --</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                select.appendChild(opt);
            });

            // Update vendor list on category change
            select.addEventListener('change', filterVendors);
        } catch(e) {
            console.error('Error loading vendors:', e);
        }
    }

    function filterVendors() {
        const selectedCat = document.getElementById('rfqCategory').value;
        const container = document.getElementById('rfqVendorsList');
        container.innerHTML = '';

        const filtered = allVendors.filter(v => !selectedCat || v.category === selectedCat);
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="color: #94a3b8;">No vendors available in this category.</div>';
            return;
        }

        filtered.forEach(v => {
            const div = document.createElement('div');
            div.className = 'vendor-box';
            div.innerHTML = `
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" name="selectedVendors" value="${v.id}">
                    <span>${v.vendor_name} (${v.gst_number || 'No GST'})</span>
                </label>
            `;
            container.appendChild(div);
        });
    }

    document.getElementById('rfqForm').addEventListener('submit', async e => {
        e.preventDefault();
        
        const title = document.getElementById('rfqTitle').value.trim();
        const description = document.getElementById('rfqDescription').value.trim();
        const quantity = parseInt(document.getElementById('rfqQuantity').value);
        const deadline = document.getElementById('rfqDeadline').value;
        
        // Find checked vendors
        const checkedBoxes = document.querySelectorAll('input[name="selectedVendors"]:checked');
        const vendorIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));

        if (vendorIds.length === 0) {
            alert('Please select at least one vendor for this RFQ.');
            return;
        }

        const payload = {
            title,
            description,
            quantity,
            deadline,
            status: 'OPEN',
            created_by: 1 // Default to first Admin user
        };

        try {
            const res = await fetch(`${API}/api/rfqs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if (data.success) {
                alert('RFQ Created Successfully!');
                window.location.href = 'main.html';
            } else {
                alert('Error creating RFQ: ' + data.message);
            }
        } catch(e) {
            alert('Failed to submit RFQ to server.');
        }
    });

    document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
