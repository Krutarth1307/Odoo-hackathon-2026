<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create RFQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
margin-bottom:25px;
color:#0f172a;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
height:120px;
resize:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.btn{
background:#2563eb;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.btn:hover{
background:#1d4ed8;
}

.vendor-box{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-top:10px;
}

        /* Dark Mode overrides */
        body.dark-mode {
            background: #0b0f19;
            color: #cbd5e1;
        }
        body.dark-mode .container {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode h1,
        body.dark-mode label {
            color: #f8fafc;
        }
        body.dark-mode input,
        body.dark-mode textarea,
        body.dark-mode select {
            background: #0f172a;
            color: #f8fafc;
            border-color: #334155;
        }
        body.dark-mode .vendor-box {
            border-color: #334155;
        }
</style>
</head>

<body>
<script>
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
    }
</script>

<div class="container">

<h1>Create RFQ</h1>

<form>

<div class="form-group">
<label>RFQ Title</label>
<input type="text" placeholder="Enter RFQ Title">
</div>

<div class="form-group">
<label>Product / Service Details</label>
<textarea placeholder="Describe products or services"></textarea>
</div>

<div class="row">

<div class="form-group">
<label>Quantity</label>
<input type="number" placeholder="Enter Quantity">
</div>

<div class="form-group">
<label>Deadline</label>
<input type="date">
</div>

</div>

<div class="form-group">
<label>Estimated Budget</label>
<input type="number" placeholder="Enter Budget">
</div>

<div class="form-group">
<label>Vendor Category</label>

<select>
<option>IT Hardware & Software Services</option>
<option>Consumer Electronics & Appliances</option>
<option>Office Furniture & Stationery</option>
<option>Cloud Infrastructure & Software</option>
<option>Courier & Transport Services</option>
</select>

</div>

<div class="form-group">

<label>Select Vendors</label>

<div class="vendor-box">
<input type="checkbox"> Infosys Limited
</div>

<div class="vendor-box">
<input type="checkbox"> Godrej Interio
</div>

<div class="vendor-box">
<input type="checkbox"> Reliance Digital (Croma)
</div>

</div>

<div class="form-group">
<label>Upload Attachment</label>
<input type="file">
</div>

<div class="form-group">
<label>Special Instructions</label>
<textarea placeholder="Any additional requirements"></textarea>
</div>

<button type="submit" class="btn">
Create RFQ
</button>

</form>

</div>

<script>
// Load vendors from API into checkboxes
async function loadVendors() {
    try {
        const res = await fetch('http://127.0.0.1:3000/vendors');
        const vendors = await res.json();
        const vendorBox = document.querySelector('.form-group:nth-child(6) div:last-child');
        vendorBox.innerHTML = '';
        vendors.forEach(v => {
            vendorBox.innerHTML += `
                <div class="vendor-box">
                    <input type="checkbox" value="${v.id}"> ${v.vendor_name}
                </div>`;
        });
    } catch(e) { console.error(e); }
}

// Submit RFQ to API
document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = {
        title: document.querySelectorAll('input[type=text]')[0].value,
        description: document.querySelectorAll('textarea')[0].value,
        quantity: document.querySelector('input[type=number]').value,
        deadline: document.querySelector('input[type=date]').value,
        status: 'OPEN',
        created_by: 1
    };
    try {
        const res = await fetch('http://127.0.0.1:3000/rfqs', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if(result.success) alert('RFQ Created Successfully! ✅');
    } catch(e) { console.error(e); }
});

loadVendors();
</script>
        
</body>
</html>
