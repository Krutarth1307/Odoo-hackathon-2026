<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
text-decoration:none;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.status{
padding:5px 10px;
border-radius:15px;
background:#dcfce7;
color:green;
}
</style>

</head>
<body>

<div class="header">
<h1>Vendor Management</h1>
<a href="#" class="btn">+ Add Vendor</a>
</div>

<table>

<tr>
<th>Vendor Name</th>
<th>Category</th>
<th>GST Number</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>Infosys Limited</td>
<td>IT Hardware & Software Services</td>
<td>29AAACI3946F1ZT</td>
<td><span class="status">Active</span></td>
<td><button>View</button></td>
</tr>

<tr>
<td>Godrej Interio</td>
<td>Office Furniture & Stationery</td>
<td>27AAACG0629Q1ZA</td>
<td><span class="status">Active</span></td>
<td><button>View</button></td>
</tr>

</table>

</body>
</html>
