<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
background:#2563eb;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
text-decoration:none;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.status{
padding:5px 10px;
border-radius:15px;
background:#dcfce7;
color:green;
}
        /* Dark Mode overrides */
        body.dark-mode {
            background: #0b0f19;
            color: #cbd5e1;
        }
        body.dark-mode table {
            background: #1e293b;
            color: #cbd5e1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        body.dark-mode h1 {
            color: #f8fafc;
        }
        body.dark-mode td {
            color: #cbd5e1;
            border-bottom: 1px solid #334155;
        }
        body.dark-mode button {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
</style>

</head>
<body>
<script>
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
    }
</script>

<div class="header">
    <h1>Vendor Management</h1>
    <button class="btn" id="addVendorBtn">+ Add Vendor</button>
</div>

<table>
    <tr>
        <th>Vendor Name</th>
        <th>Category</th>
        <th>GST Number</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tbody id="vendorsBody"></tbody>
</table>

<!-- Vendor Modal -->
<div class="modal" id="vendorModal">
    <div class="modal-content">
        <span class="close" id="closeVendorModal">&times;</span>
        <h3 id="vendorModalTitle">Add Vendor</h3>
        <form id="vendorForm">
            <input type="hidden" id="vendorId" />
            <div class="form-group">
                <label for="vendorName">Vendor Name</label>
                <input type="text" id="vendorName" required />
            </div>
            <div class="form-group">
                <label for="vendorCategory">Category</label>
                <input type="text" id="vendorCategory" required />
            </div>
            <div class="form-group">
                <label for="vendorGST">GST Number</label>
                <input type="text" id="vendorGST" required />
            </div>
            <div class="form-group">
                <label for="vendorStatus">Status</label>
                <select id="vendorStatus" required>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>

<style>
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
    .modal-content { background:white; padding:20px; border-radius:8px; width:400px; position:relative; }
    .close { position:absolute; top:10px; right:12px; cursor:pointer; font-size:20px; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; margin-bottom:4px; font-weight:500; }
    .form-group input, .form-group select { width:100%; padding:6px; border:1px solid #cbd5e1; border-radius:4px; }
</style>

<script>
    const API = '';

    async function renderVendors() {
        try {
            const res = await fetch(`${API}/api/vendors`);
            const vendors = await res.json();
            const tbody = document.getElementById('vendorsBody');
            tbody.innerHTML = '';
            
            if (vendors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">No vendors found.</td></tr>';
                return;
            }

            vendors.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${v.vendor_name}</td>
                    <td>${v.category || '—'}</td>
                    <td>${v.gst_number || '—'}</td>
                    <td><span class="status ${v.status.toLowerCase()}">${v.status}</span></td>
                    <td>
                        <button class="btn btn-outline" onclick="openVendorEdit(${v.id}, '${v.vendor_name}', '${v.category}', '${v.gst_number}', '${v.status}')">Edit</button>
                        <button class="btn btn-outline" onclick="removeVendor(${v.id})" style="margin-left:4px;">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) {
            document.getElementById('vendorsBody').innerHTML = 
                '<tr><td colspan="5" style="color:#ef4444;text-align:center;">⚠ Could not load vendors</td></tr>';
        }
    }

    function openVendorEdit(id, name, category, gst, status) {
        document.getElementById('vendorModalTitle').innerText = 'Edit Vendor';
        document.getElementById('vendorId').value = id;
        document.getElementById('vendorName').value = name;
        document.getElementById('vendorCategory').value = category;
        document.getElementById('vendorGST').value = gst;
        document.getElementById('vendorStatus').value = status;
        document.getElementById('vendorModal').style.display = 'flex';
    }

    function openVendorAdd() {
        document.getElementById('vendorModalTitle').innerText = 'Add Vendor';
        document.getElementById('vendorId').value = '';
        document.getElementById('vendorName').value = '';
        document.getElementById('vendorCategory').value = '';
        document.getElementById('vendorGST').value = '';
        document.getElementById('vendorStatus').value = 'ACTIVE';
        document.getElementById('vendorModal').style.display = 'flex';
    }

    async function removeVendor(id) {
        if (!confirm('Delete this vendor?')) return;
        try {
            await fetch(`${API}/api/vendors/${id}`, { method: 'DELETE' });
            renderVendors();
        } catch(e) {
            alert('Error deleting vendor');
        }
    }

    document.getElementById('addVendorBtn').addEventListener('click', openVendorAdd);
    document.getElementById('closeVendorModal').addEventListener('click', () => {
        document.getElementById('vendorModal').style.display = 'none';
    });

    document.getElementById('vendorForm').addEventListener('submit', async e => {
        e.preventDefault();
        const idVal = document.getElementById('vendorId').value;
        const vendor_name = document.getElementById('vendorName').value.trim();
        const category = document.getElementById('vendorCategory').value.trim();
        const gst_number = document.getElementById('vendorGST').value.trim();
        const status = document.getElementById('vendorStatus').value;

        const payload = { vendor_name, category, gst_number, status };

        try {
            if (idVal) {
                await fetch(`${API}/api/vendors/${idVal}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } else {
                await fetch(`${API}/api/vendors`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }
            document.getElementById('vendorModal').style.display = 'none';
            renderVendors();
        } catch(e) {
            alert('Error saving vendor');
        }
    });

    document.addEventListener('DOMContentLoaded', renderVendors);
</script>

</body>
</html>
